<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f4f7; color: #51545e; margin: 0; padding: 0; width: 100%; }
        .content { max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; margin-top: 40px; border: 1px solid #e8e8e8; }
        .header { background-color: #2d3748; padding: 25px; text-align: center; color: #ffffff; }
        .body-content { padding: 45px; line-height: 1.6; }
        h1 { color: #333333; font-size: 22px; font-weight: bold; margin-top: 0; }
        p { margin-top: 0; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="content">
    <div class="header">
        <strong>MesterMC</strong>
    </div>

    <div class="body-content">
        <h1>{{TITLE}}</h1>
        <p>Hello {{USERNAME}},</p>
        <p>{{MESSAGE_BODY}}</p>

        <p>If you did not request this, please ignore this email.</p>
        <p>Thanks,<br>The MesterMC Team</p>
    </div>
</div>
</body>
</html>
